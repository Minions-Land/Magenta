kind = "policy"
product = "capability"
slot = "policy"
autoload = false
name = "policy"
description = "Experimental approval and shell policy decisions; not connected to default coding-agent enforcement."
source = "magenta"
origin = "magenta1-general-harness"
origin_rel = "ported/adapted"
impl = ["policy/magenta/policy.ts", "policy/magenta/approval.ts", "policy/magenta/shell-policy.ts"]
targets = ["approval://policy", "shell://policy"]

[assumption]
compensates = "When a host explicitly integrates this provider, approval tiers and shell-command classification are computed deterministically off the model surface instead of trusting the model to self-police dangerous or mutating actions."
rationale = "stated"  # approval.ts/shell-policy.ts set model_surface:false, audience:operator
calibrated_for = ["any"]
review_trigger = "never"
load_bearing = "unmeasured"  # provider is experimental and not connected to default coding-agent enforcement
eval_scenarios = []

[[policies]]
name = "approval"
target = "approval://policy"
operations = ["decide", "status"]

[[policies]]
name = "shell"
target = "shell://policy"
operations = ["classify", "status"]
