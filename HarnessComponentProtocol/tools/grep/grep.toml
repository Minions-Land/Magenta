kind = "tool"
product = "tool"
name = "grep"
source = "pi"
sources = ["pi", "magenta"]
description = "Search file contents for a pattern. Returns matching lines with file paths and line numbers. Respects .gitignore. Output is truncated to a match limit or KB (whichever is hit first). Long lines are truncated."

[source_config.magenta]
implementation_manifest = "magenta/grep.toml"
requires = ["runtime:process", "sandbox"]

[parameters]
type = "object"
required = ["pattern"]

[parameters.properties.pattern]
type = "string"
description = "Search pattern (regex or literal string)"

[parameters.properties.path]
type = "string"
optional = true
description = "Directory or file to search (default: current directory)"

[parameters.properties.glob]
type = "string"
optional = true
description = "Filter files by glob pattern, e.g. '*.ts' or '**/*.spec.ts'"

[parameters.properties.ignoreCase]
type = "boolean"
optional = true
description = "Case-insensitive search (default: false)"

[parameters.properties.literal]
type = "boolean"
optional = true
description = "Treat pattern as literal string instead of regex (default: false)"

[parameters.properties.context]
type = "number"
optional = true
description = "Number of lines to show before and after each match (default: 0)"

[parameters.properties.limit]
type = "number"
optional = true
description = "Maximum number of matches to return (default: 100)"
