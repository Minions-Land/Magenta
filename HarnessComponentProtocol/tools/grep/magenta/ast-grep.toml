kind = "process"
name = "AstGrep"
description = "AST-aware structural code search over JavaScript, TypeScript, TSX, Rust, and Python files."
command = "../../../_magenta/process-tools/target/release/magenta-process-tools"
args = ["ast-grep"]
operation = "read"
read_only = true
destructive = false
version = "1.0.0"
tags = ["filesystem", "search", "ast", "tree-sitter", "structural-search"]
capabilities = ["ast-grep", "tree-sitter", "structural-code-search", "metavariables", "glob-filter"]
requires = []

[parameters]
type = "object"
required = ["pattern"]

[parameters.properties.pattern]
type = "string"
description = "ast-grep pattern. Use $NAME for captures, $_ for a single anonymous node, and $$$NAME for zero or more nodes."

[parameters.properties.path]
type = "string"
description = "File or directory to search (default: current workspace)"

[parameters.properties.lang]
type = "string"
description = "Optional language override: javascript, typescript, tsx, rust, or python"

[parameters.properties.glob]
type = "string"
description = "Optional glob filter relative to the search directory"

[parameters.properties.selector]
type = "string"
description = "Optional contextual selector kind for patterns that need parse context"

[parameters.properties.strictness]
type = "string"
description = "Match strictness: cst, smart, ast, relaxed, signature, or template"
default = "smart"

[parameters.properties.include_hidden]
type = "boolean"
description = "Include hidden files/directories"
default = false

[parameters.properties.include_node_modules]
type = "boolean"
description = "Include node_modules directories"
default = false

[parameters.properties.include_meta]
type = "boolean"
description = "Include captured metavariable bindings in output"
default = false

[parameters.properties.limit]
type = "integer"
description = "Maximum visible matches"
default = 50

[parameters.properties.offset]
type = "integer"
description = "Number of matches to skip before rendering"
default = 0
