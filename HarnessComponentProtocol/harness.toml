name = "magenta-harness"
description = "Magenta3 Harness Modules and their HcpServer/HcpMagnet declarations."

[[modules]]
kind = "tool"
name = "tools"
path = "tools"
sources = ["descriptor"]
product = "tool"

[[modules]]
kind = "skill"
name = "skills"
path = "skills"
sources = ["descriptor"]
product = "resource"

[[modules]]
kind = "prompt-template"
name = "descriptor"
path = "prompt-templates"
sources = ["descriptor"]
product = "resource"

[[modules]]
kind = "system-prompt"
name = "descriptor"
path = "system-prompt"
sources = ["descriptor"]
product = "resource"
requires = ["system-prompt"]

[[modules]]
kind = "theme"
name = "themes"
path = "themes"
sources = ["descriptor"]
product = "resource"

[[modules]]
kind = "brand"
name = "brand"
path = "brand"
sources = ["descriptor"]
product = "resource"

