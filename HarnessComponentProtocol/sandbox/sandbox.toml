kind = "sandbox"
product = "capability"
slot = "sandbox"
autoload = true
name = "sandbox"
description = "Sandbox profiles for HCP process-backed tools, stdio MCP, and package process execution."
source = "magenta"
bundles = ["runtime:magenta"]
origin = "magenta1-general-harness"
origin_rel = "migrated/adapted"
impl = ["sandbox/magenta/sandbox.ts"]
profiles = ["magenta/readonly-fs.toml", "magenta/restricted.toml", "magenta/workspace-write.toml", "magenta/network-read.toml", "magenta/trusted.toml"]
targets = ["sandbox://readonly-fs", "sandbox://restricted", "sandbox://workspace-write", "sandbox://network-read", "sandbox://trusted", "hook://sandbox-select"]

[assumption]
compensates = "For execution paths that explicitly resolve sandbox and runtime:process, selected profiles feed deterministic portable filesystem, environment, timeout, and network guards instead of relying on model self-restraint."
rationale = "stated"  # profile catalog + selection provider in magenta/sandbox.ts
calibrated_for = ["any"]
review_trigger = "never"
load_bearing = "verified"  # verified only for consumers routed through runtime:process; this is not an OS sandbox
eval_scenarios = []

[runtime]
profile_enforcement = "runtime:process-portable-guards"
os_enforcement = "not-ported"
notes = "This Module selects profiles but does not isolate processes. Native pi tool execution and other paths that do not resolve these HCP capabilities are outside its enforcement scope."
