kind = "runtime"
product = "capability"
slot = "runtime:process"
autoload = true
name = "process"
description = "Process runtime with portable guards for execution paths that explicitly resolve runtime:process."
source = "magenta"
bundles = ["sandbox:magenta"]
origin = "magenta1-general-harness"
origin_rel = "ported/adapted"
target = "runtime://process"
impl = ["runtime/magenta/process-runtime.ts"]

[assumption]
compensates = "For execution paths that explicitly resolve runtime:process, portable guards (path traversal, workspace cwd, environment allowlist, network deny/allowlist, and wall-clock timeout) enforce limits outside the model surface."
rationale = "stated"  # [policy].portable_guards + validatePolicy() throws in magenta/process-runtime.ts
calibrated_for = ["any"]
review_trigger = "never"
load_bearing = "verified"  # verified for runtime:process consumers only; OS-level backend is not ported
eval_scenarios = []

[policy]
portable_guards = ["direct-exec gate", "workspace cwd", "environment allowlist", "wall-clock timeout", "filesystem read/write checks for declared paths", "network deny tag checks", "network allowlist checks for declared URL/host inputs"]
os_enforcement = "not-ported"
notes = "Magenta1 runtime_provider.rs also had sandbox-exec/bwrap backends. This TS provider enforces portable guards only and is not a universal gate for native pi tools."
