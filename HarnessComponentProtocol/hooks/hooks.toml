kind = "hook"
product = "capability"
slot = "hook"
autoload = false
requires = ["policy", "sandbox"]
name = "hooks"
description = "Experimental lifecycle hook provider; not connected to the default coding-agent session."
source = "magenta"
origin = "magenta1-general-harness"
origin_rel = "ported/adapted"
impl = ["hooks/magenta/hooks.ts"]
targets = ["hook://init", "hook://pre-turn", "hook://pre-llm", "hook://post-llm", "hook://pre-tool", "hook://post-tool", "hook://compact", "hook://workflow"]

[assumption]
compensates = "If a host explicitly connects each lifecycle phase and typed action, hooks can trigger cross-cutting work deterministically instead of depending on the model prompt."
rationale = "inferred"  # provider envelopes describe the intended role; default coding-agent does not execute them
calibrated_for = ["claude-sonnet-4-5", "claude-opus-4-5"]
review_trigger = "model-change"
load_bearing = "unmeasured"  # explicit-selection experiment; lifecycle coverage and returned actions are incomplete
eval_scenarios = []

[[hooks]]
name = "init"
target = "hook://init"
description = "Session/harness initialization hook."

[[hooks]]
name = "pre-turn"
target = "hook://pre-turn"
description = "Before-turn context injection hook."

[[hooks]]
name = "pre-llm"
target = "hook://pre-llm"
description = "Before-LLM lifecycle hook."

[[hooks]]
name = "post-llm"
target = "hook://post-llm"
description = "After-LLM lifecycle hook."

[[hooks]]
name = "pre-tool"
target = "hook://pre-tool"
description = "Before-tool lifecycle hook with sandbox, approval, and shell policy actions."

[[hooks]]
name = "post-tool"
target = "hook://post-tool"
description = "After-tool lifecycle hook."

[[hooks]]
name = "compact"
target = "hook://compact"
description = "Compaction lifecycle hook."

[[hooks]]
name = "workflow"
target = "hook://workflow"
description = "Workflow dispatch hook."
