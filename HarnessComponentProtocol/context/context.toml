kind = "context"
product = "capability"
slot = "context"
autoload = true
name = "workspace"
description = "Workspace context provider migrated from Magenta1 general-harness."
source = "magenta"
origin = "magenta1-general-harness"
origin_rel = "ported/adapted"
impl = ["context/magenta/context.ts"]
targets = ["context://workspace", "context://project"]
operations = ["read", "status"]

[assumption]
compensates = "The model has no built-in project awareness, so it discovers and injects project instruction files (AGENTS.md, CLAUDE.md, etc.) and rewrites harness-internal jargon the model would otherwise misread."
rationale = "inferred"  # context/README.md returns "model-safe context text" and modelSafeText() rewrites jargon, but neither states the model-limitation as such
calibrated_for = ["claude-sonnet-4-5", "claude-opus-4-5"]
review_trigger = "model-change"
load_bearing = "unmeasured"
eval_scenarios = []
