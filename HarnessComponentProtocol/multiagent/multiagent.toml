kind = "multiagent"
product = "capability"
slot = "multiagent"
autoload = true
name = "multiagent"
description = "Workflow orchestration over sessionless, one-shot workers. Six named presets provide fixed runtime-owned control flow; the 'script' pattern gives the author if/while/await flow through runtime-controlled worker primitives. Both forms share depth guards, tool denial, timeout, guard injection, state persistence, and cancellation."
source = "magenta"
origin = "magenta1-general-harness"
origin_rel = "ported/adapted"
impl = ["multiagent/workflow/magenta/orchestrator.ts", "multiagent/workflow/magenta/worker.ts", "multiagent/workflow/magenta/HcpMagnet.ts"]
targets = ["multiagent://local"]

[assumption]
compensates = "The model tends to skip the disciplined 'soul step' of a procedure (classify-first, cover-every, independent re-check) and cannot reliably control its own flow or termination, so named presets enforce fixed control flow and inject guard prompts in code."
rationale = "stated"  # orchestrator.ts distinguishes fixed preset flow from author-owned script flow
calibrated_for = ["claude-sonnet-4-5", "claude-opus-4-5"]
review_trigger = "model-change"
load_bearing = "unmeasured"
eval_scenarios = []

[[patterns]]
name = "classify_and_act"
description = "Classify mixed input first, then route each item to a type-specific handler. Forces the classify step that a generic 'handle these' prompt would skip."

[[patterns]]
name = "fan_out_synthesize"
description = "Run the same check over every object in parallel, then merge into one consolidated artifact. For every/all tasks that end in a single report."

[[patterns]]
name = "adversarial_verify"
description = "Generator casts a wide net for candidates; independent verifiers re-check each; only confirmed findings pass. For high false-positive-cost work (security, compliance)."

[[patterns]]
name = "generate_and_filter"
description = "Independent candidates generated in parallel, then scored by quantifiable criteria; keep the strongest. For open-ended tasks with objective evaluation."

[[patterns]]
name = "tournament"
description = "Candidates compete in a pairwise elimination bracket judged by a subagent. For subjective quality where 'good' is hard to quantify."

[[patterns]]
name = "loop_until_done"
description = "Iterate a refine worker, excluding prior findings each round; stop when a round yields no new findings or a hard iteration cap is hit. For exhaustive scans."

[[patterns]]
name = "script"
description = "Run an author-owned executable TS/JS workflow module (write the loop, not the prompt). The author drives if/while/await and termination using injected primitives (agent, parallelAgents, pipeline, phase, log, guards); the runtime controls worker creation and enforces depth guard, tool denial, timeout, guard injection, cancellation, and state persistence under .magenta/tmp/<id>/. Reusable building blocks (contract negotiation, four-axis scoring) live in workflow/magenta/presets/snippets/."
