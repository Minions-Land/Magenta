schema_version = "magenta.package.v1"
id = "ExamplePackage"
name = "ExamplePackage"
kind = "harness"
description = "Example selectable harness package."

[[components]]
kind = "skill"
name = "example-shared"
path = "skills/example-shared"
include_in_context = true

[[components]]
kind = "skill"
name = "example-task"
path = "skills/example-task"
include_in_context = true

[[components]]
kind = "tool"
name = "example_environment"
path = "tools/example-environment/example-environment.toml"

[[components]]
kind = "tool"
name = "example_compute"
path = "tools/example-compute/example-compute.toml"

[[components]]
kind = "python-runtime"
name = "example_compute_impl"
path = "tools/example-compute/python/example_compute_impl"

[[components]]
kind = "env"
name = "pixi"
path = "tools/example-environment/pixi.toml"
