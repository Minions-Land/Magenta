schema_version = "magenta.package.v1"
id = "ExampleDomain"
name = "ExampleDomain"
kind = "domain"
domain = "example"
description = "Example domain harness package."
default_profiles = ["general"]

[[profiles]]
name = "general"
description = "Shared domain harness resources."
harness = "general/harness.toml"

[[profiles]]
name = "task"
description = "Task-specific harness resources."
extends = ["general"]
harness = "task/example-task/harness.toml"
