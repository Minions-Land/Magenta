schema_version = "magenta.tool.v1"
name = "biomni_database"
description = "45 database query functions from Biomni covering PubMed, UniProt, KEGG, STRING, cBioPortal, Ensembl, NCBI, PDB and more biological databases"
source = "biomni/tool/database.py"
runtime = "python"
requires = ["biomni"]

[metadata]
display-name = "Biomni Database Tools"
authors = "Stanford SNAP Lab"
license = "MIT"
version = "1.0"

[[functions]]
name = "query_pubmed"
description = "Search PubMed for biomedical literature"
parameters = ["query", "max_results"]

[[functions]]
name = "query_uniprot"
description = "Query UniProt protein database"
parameters = ["protein_id", "fields"]

[[functions]]
name = "query_kegg"
description = "Query KEGG pathway database"
parameters = ["pathway_id", "organism"]

[[functions]]
name = "query_string"
description = "Query STRING protein-protein interaction network"
parameters = ["protein_list", "species"]

[[functions]]
name = "query_cbioportal"
description = "Query cBioPortal cancer genomics database"
parameters = ["study_id", "gene_list"]

[[functions]]
name = "query_ensembl"
description = "Query Ensembl genomic database"
parameters = ["gene_id", "species"]

[[functions]]
name = "query_ncbi"
description = "Query NCBI databases (GenBank, RefSeq, etc.)"
parameters = ["query", "database"]

[[functions]]
name = "query_pdb"
description = "Query Protein Data Bank for protein structures"
parameters = ["pdb_id", "format"]

# Total: 45 functions available in database.py
# This is a representative subset - see Biomni documentation for complete list
