schema_version = "magenta.tool.v1"
name = "biomni_pharmacology"
description = "42 drug design and pharmacology functions from Biomni for ADME prediction, toxicity assessment, drug-drug interactions, and lead optimization"
source = "biomni/tool/pharmacology.py"
runtime = "python"
requires = ["biomni", "rdkit", "chembl-webresource-client"]

[metadata]
display-name = "Biomni Pharmacology Tools"
authors = "Stanford SNAP Lab"
license = "MIT"
version = "1.0"

[[functions]]
name = "predict_adme"
description = "Predict ADME (Absorption, Distribution, Metabolism, Excretion) properties"
parameters = ["smiles", "properties"]

[[functions]]
name = "predict_toxicity"
description = "Predict toxicity endpoints (hepatotoxicity, cardiotoxicity, etc.)"
parameters = ["compound", "endpoints"]

[[functions]]
name = "check_drug_interactions"
description = "Check potential drug-drug interactions"
parameters = ["drug_list", "severity_threshold"]

[[functions]]
name = "calculate_druglikeness"
description = "Calculate drug-likeness scores (Lipinski, Veber, etc.)"
parameters = ["molecules", "rules"]

[[functions]]
name = "predict_bioavailability"
description = "Predict oral bioavailability"
parameters = ["smiles", "model"]

[[functions]]
name = "optimize_lead"
description = "Suggest structural modifications for lead optimization"
parameters = ["compound", "objectives"]

[[functions]]
name = "predict_binding_affinity"
description = "Predict protein-ligand binding affinity"
parameters = ["protein", "ligand", "method"]

[[functions]]
name = "screen_compounds"
description = "Virtual screening of compound libraries"
parameters = ["library", "target", "filters"]

# Total: 42 functions available in pharmacology.py
