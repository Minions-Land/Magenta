schema_version = "magenta.tool.v1"
name = "biomni_molecular_biology"
description = "18 molecular biology functions from Biomni for PCR primer design, plasmid construction, protein expression, and cloning strategies"
source = "biomni/tool/molecular_biology.py"
runtime = "python"
requires = ["biomni", "biopython", "primer3-py"]

[metadata]
display-name = "Biomni Molecular Biology Tools"
authors = "Stanford SNAP Lab"
license = "MIT"
version = "1.0"

[[functions]]
name = "design_pcr_primers"
description = "Design PCR primers for target amplification"
parameters = ["template", "target_region", "conditions"]

[[functions]]
name = "design_cloning_strategy"
description = "Design molecular cloning strategy (restriction, Gibson, etc.)"
parameters = ["insert", "vector", "method"]

[[functions]]
name = "optimize_codon"
description = "Optimize codon usage for expression host"
parameters = ["sequence", "organism"]

[[functions]]
name = "predict_expression"
description = "Predict protein expression level"
parameters = ["sequence", "host", "conditions"]

[[functions]]
name = "design_mutagenesis_primers"
description = "Design primers for site-directed mutagenesis"
parameters = ["template", "mutation", "method"]

[[functions]]
name = "check_restriction_sites"
description = "Find restriction enzyme sites in sequence"
parameters = ["sequence", "enzymes"]

[[functions]]
name = "design_gibson_assembly"
description = "Design Gibson assembly fragments with overlaps"
parameters = ["fragments", "overlap_length"]

[[functions]]
name = "predict_protein_yield"
description = "Predict protein purification yield"
parameters = ["construct", "expression_system"]

# Total: 18 functions available in molecular_biology.py
