schema_version = "magenta.package.v1"
id = "Biomni"
name = "Biomni"
kind = "domain"
domain = "biomedical-ai"
description = "General-purpose biomedical AI toolkit from Stanford SNAP Lab with 248+ tool functions and knowledge guides covering database queries, genomics, pharmacology, and lab automation. All tools are Python modules copied from Biomni source."

# Default: load all (整包加载，无 profiles)
default_profiles = []

# === Knowledge Guide Skills ===

[[components]]
kind = "skill"
name = "sgrna-design"
path = "skills/sgrna-design"
description = "CRISPR sgRNA design guide with 300+ validated sequences"
include_in_context = false

[[components]]
kind = "skill"
name = "single-cell-annotation"
path = "skills/single-cell-annotation"
description = "scRNA-seq cell type annotation best practices"
include_in_context = false

# === Python Tool Modules (23 modules, 248 functions) ===

[[components]]
kind = "python-module"
name = "biochemistry"
path = "tools/python/biochemistry.py"
description = "5 biochemistry functions (protein analysis, enzyme kinetics)"

