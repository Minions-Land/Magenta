name = "AutOmicScience-general"
description = "Shared omics package foundation: runtime, pinned environments, tools, and cross-modality guidance."

[[components]]
kind = "skill"
name = "omics-shared"
path = "skills/omics-shared"
include_in_context = true

[[components]]
kind = "tool"
name = "omics_preflight"
path = "tools/omics-preflight.toml"

[[components]]
kind = "tool"
name = "omics_runtime"
path = "tools/omics-runtime.toml"

[[components]]
kind = "python-runtime"
name = "aose_omics_runtime"
path = ".omics-runtime/aose_omics_runtime"

[[components]]
kind = "runtime-tests"
name = "aose_omics_runtime_tests"
path = ".omics-runtime/tests"

[[components]]
kind = "env"
name = "pixi"
path = "../pixi.toml"

[[components]]
kind = "env-lock"
name = "pixi"
path = "../pixi.lock"
