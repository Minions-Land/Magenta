schema_version = "magenta.package.v1"
id = "AutOmicScience"
name = "AutOmicScience"
kind = "domain"
domain = "bioinformatics"
description = "Single-cell and spatial omics harness package migrated from AOSE optimize_omics."

[[components]]
kind = "brand"
name = "AutOmicScience"
path = "brands/AutOmicScience"

[[components]]
kind = "skill"
name = "omics-shared"
path = "skills/omics-shared"
include_in_context = true

[[components]]
kind = "skill"
name = "multi-omics"
path = "skills/multi-omics"
include_in_context = true

[[components]]
kind = "skill"
name = "scatac-seq"
path = "skills/scatac-seq"
include_in_context = true

[[components]]
kind = "skill"
name = "rna"
path = "skills/rna"
include_in_context = true

[[components]]
kind = "skill"
name = "spatial"
path = "skills/spatial"
include_in_context = true

[[components]]
kind = "system-prompt"
name = "system-prompt"
path = "system-prompt/system-prompt.toml"

[[components]]
kind = "tool"
name = "omics_environment"
path = "tools/omics-environment/omics-environment.toml"

[[components]]
kind = "tool"
name = "omics_preflight"
path = "tools/omics-preflight/omics-preflight.toml"

[[components]]
kind = "tool"
name = "omics_compute"
path = "tools/omics-compute/omics-compute.toml"

[[components]]
kind = "python-runtime"
name = "aose_omics_runtime"
path = "tools/omics-compute/python/aose_omics_runtime"

[[components]]
kind = "runtime-tests"
name = "aose_omics_runtime_tests"
path = "tools/omics-compute/python/tests"

[[components]]
kind = "env"
name = "pixi"
path = "tools/omics-environment/pixi.toml"

[[components]]
kind = "env-lock"
name = "pixi"
path = "tools/omics-environment/pixi.lock"
