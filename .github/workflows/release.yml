name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to build and publish'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: macos-14  # arm64 runner
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22.19.0'
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      
      - name: Install dependencies
        run: |
          npm install
          CLIPBOARD_VERSION=$(node -p "require('./pi/coding-agent/package.json').optionalDependencies['@mariozechner/clipboard']")
          CLIPBOARD_STAGE=$(mktemp -d)
          trap 'rm -rf "$CLIPBOARD_STAGE"' EXIT
          npm install --prefix "$CLIPBOARD_STAGE" --include=optional --omit=dev --no-save \
            --package-lock=false --force --ignore-scripts \
            @mariozechner/clipboard@"$CLIPBOARD_VERSION" \
            @mariozechner/clipboard-darwin-universal@"$CLIPBOARD_VERSION" \
            @mariozechner/clipboard-linux-x64-gnu@"$CLIPBOARD_VERSION" \
            @mariozechner/clipboard-win32-x64-msvc@"$CLIPBOARD_VERSION"
          mkdir -p node_modules/@mariozechner
          for PACKAGE in clipboard clipboard-darwin-universal clipboard-linux-x64-gnu clipboard-win32-x64-msvc; do
            rm -rf "node_modules/@mariozechner/$PACKAGE"
            cp -R "$CLIPBOARD_STAGE/node_modules/@mariozechner/$PACKAGE" node_modules/@mariozechner/
          done
          rm -rf "$CLIPBOARD_STAGE"
          trap - EXIT
      
      - name: Verify embedded binaries
        run: |
          cd pi/coding-agent
          node scripts/check-process-tools.mjs
      
      - name: Build all platforms
        run: |
          cd pi/coding-agent
          npm run build:release-all
      
      - name: Create release tarball
        run: |
          cd pi/coding-agent/dist/release
          test -f magenta-release.json
          RESOURCE_VERSION=$(node -p "require('./magenta-release.json').version")
          test "$RESOURCE_VERSION" = "${RELEASE_TAG#v}"
          COPYFILE_DISABLE=1 tar -czf magenta-resources-universal.tar.gz \
            sandbox tools policy runtime skills theme assets \
            export-html docs examples package.json README.md \
            magenta-release.json \
            CHANGELOG.md *.wasm
          node --input-type=module <<'NODE'
          import { inspectReleaseResourceArchive } from "../utils/github-release-update-support.js";
          await inspectReleaseResourceArchive("magenta-resources-universal.tar.gz");
          NODE
          bun build --compile ../../scripts/clipboard-runtime-probe.ts --outfile magenta-clipboard-runtime-probe
          ./magenta-clipboard-runtime-probe
          rm magenta-clipboard-runtime-probe
      
      - name: Calculate checksums
        run: |
          cd pi/coding-agent/dist/release
          shasum -a 256 \
            magenta-macos-arm64 magenta-macos-x64 \
            magenta-linux-x64 magenta-windows-x64.exe \
            magenta-resources-universal.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Verify macOS release startup
        run: |
          cd pi/coding-agent/dist/release
          case "$(uname -m)" in
            arm64) ./magenta-macos-arm64 --help > /tmp/magenta-help.txt ;;
            x86_64) ./magenta-macos-x64 --help > /tmp/magenta-help.txt ;;
            *) echo "Unsupported macOS runner architecture: $(uname -m)"; exit 1 ;;
          esac
          test -f _magenta/process-tools/target/release/magenta-process-tools

      - name: Upload to draft release for verification
        uses: softprops/action-gh-release@v3
        with:
          repository: Minions-Land/Magenta-CLI
          token: ${{ secrets.MAGENTA_CLI_RELEASE_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: main
          files: |
            pi/coding-agent/dist/release/magenta-macos-arm64
            pi/coding-agent/dist/release/magenta-macos-x64
            pi/coding-agent/dist/release/magenta-linux-x64
            pi/coding-agent/dist/release/magenta-windows-x64.exe
            pi/coding-agent/dist/release/magenta-resources-universal.tar.gz
            pi/coding-agent/dist/release/SHA256SUMS
          draft: true
          prerelease: false
          body: "Pending verification..."

  smoke-windows:
    name: Smoke test Windows release
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout installer
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ inputs.release_tag || github.ref_name }}

      - name: Parse Windows installer
        shell: powershell
        run: |
          $tokens = $null
          $parseErrors = $null
          $installerPath = (Resolve-Path ".\scripts\install.ps1").Path
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            $installerPath,
            [ref]$tokens,
            [ref]$parseErrors
          )
          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Error $_.Message }
            throw "scripts/install.ps1 failed PowerShell syntax validation"
          }

      - name: Download release assets from draft
        run: |
          gh release download ${{ inputs.release_tag || github.ref_name }} --repo Minions-Land/Magenta-CLI --dir release --pattern '*'
        env:
          GH_TOKEN: ${{ secrets.MAGENTA_CLI_RELEASE_TOKEN }}

      - name: Install resources and start Magenta
        shell: powershell
        run: |
          $tempRoot = [System.IO.Path]::GetPathRoot([System.IO.Path]::GetTempPath())
          $alternateDrive = Get-PSDrive -PSProvider FileSystem |
            Where-Object { $_.Root -and $_.Root -ne $tempRoot -and $_.Free -gt 1GB } |
            Select-Object -First 1
          if ($alternateDrive) {
            $installDir = Join-Path $alternateDrive.Root ("MagentaSmoke-" + [Guid]::NewGuid().ToString("N"))
            Write-Host "Testing cross-volume install from TEMP $tempRoot to $installDir"
          } else {
            $installDir = Join-Path $env:RUNNER_TEMP ("MagentaSmoke-" + [Guid]::NewGuid().ToString("N"))
            Write-Host "No alternate filesystem drive available; installing to $installDir"
          }
          "MAGENTA_SMOKE_INSTALL_DIR=$installDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $server = Start-Process python -ArgumentList "-m", "http.server", "8765", "--directory", "release" -PassThru
          try {
            $serverReady = $false
            for ($attempt = 0; $attempt -lt 30; $attempt++) {
              try {
                Invoke-WebRequest -UseBasicParsing -Method Head -TimeoutSec 1 -Uri "http://127.0.0.1:8765/SHA256SUMS" | Out-Null
                $serverReady = $true
                break
              } catch {
                Start-Sleep -Milliseconds 500
              }
            }
            if (-not $serverReady) { throw "Timed out waiting for the local release asset server" }
            .\scripts\install.ps1 -InstallDir $installDir -AssetBaseUrl "http://127.0.0.1:8765"

            # The installer must inspect the archive before extraction. A
            # checksum-valid tar containing a top-level magenta.exe could
            # otherwise overwrite the binary that was verified above.
            $env:MAGENTA_MALICIOUS_ARCHIVE = Join-Path $PWD "release\magenta-resources-universal.tar.gz"
            $maliciousArchiveScript = @'
          import io
          import os
          import tarfile

          payload = b"not the verified Magenta binary"
          info = tarfile.TarInfo("magenta.exe")
          info.size = len(payload)
          with tarfile.open(os.environ["MAGENTA_MALICIOUS_ARCHIVE"], "w:gz") as archive:
              archive.addfile(info, io.BytesIO(payload))
          '@
            $maliciousArchiveScript | python -
            $binaryHash = (Get-FileHash -Algorithm SHA256 -Path "release\magenta-windows-x64.exe").Hash.ToLowerInvariant()
            $resourceHash = (Get-FileHash -Algorithm SHA256 -Path $env:MAGENTA_MALICIOUS_ARCHIVE).Hash.ToLowerInvariant()
            @(
              "$binaryHash  magenta-windows-x64.exe",
              "$resourceHash  magenta-resources-universal.tar.gz"
            ) | Set-Content -LiteralPath "release\SHA256SUMS" -Encoding Ascii
            $rejectedUnsafeArchive = $false
            try {
              $rejectedInstallDir = "$installDir-reject-unsafe-archive"
              .\scripts\install.ps1 -InstallDir $rejectedInstallDir -AssetBaseUrl "http://127.0.0.1:8765"
            } catch {
              if ($_.Exception.Message -notmatch "unknown top-level path: magenta.exe") { throw }
              $rejectedUnsafeArchive = $true
            }
            if (-not $rejectedUnsafeArchive) { throw "Windows installer accepted an unsafe resource archive" }
          } finally {
            Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
          }
          & "$installDir\magenta.exe" --help | Out-File -FilePath magenta-help.txt -Encoding utf8
          if ($LASTEXITCODE -ne 0) { throw "Installed Magenta failed with exit code $LASTEXITCODE" }

      - name: Start installed binary from PowerShell 7
        shell: pwsh
        run: |
          & "$env:MAGENTA_SMOKE_INSTALL_DIR\magenta.exe" --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Installed Magenta failed under PowerShell 7 with exit code $LASTEXITCODE" }

      - name: Start installed binary from Git Bash
        shell: bash
        run: |
          install_dir="$(cygpath -u "$MAGENTA_SMOKE_INSTALL_DIR")"
          "$install_dir/magenta.exe" --help >/dev/null

  publish:
    name: Publish verified release
    needs: [build, smoke-windows]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Download verified release assets from draft
        run: |
          gh release download ${{ env.RELEASE_TAG }} --repo Minions-Land/Magenta-CLI --dir release --pattern '*'
        env:
          GH_TOKEN: ${{ secrets.MAGENTA_CLI_RELEASE_TOKEN }}

      - name: Extract release notes
        id: release_notes
        run: |
          VERSION="${RELEASE_TAG}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Extract release notes from CHANGELOG
          cd pi/coding-agent
          awk "/^## \[${VERSION#v}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > /tmp/release_notes.md
          
          # Fallback if no notes found
          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release $VERSION" > /tmp/release_notes.md
          fi
      
      - name: Finalize GitHub Release
        run: |
          # Get the draft release ID
          RELEASE_ID=$(gh api /repos/Minions-Land/Magenta-CLI/releases --jq '.[] | select(.tag_name=="${{ env.RELEASE_TAG }}" and .draft==true) | .id')
          if [ -z "$RELEASE_ID" ]; then
            echo "Error: Draft release ${{ env.RELEASE_TAG }} not found"
            exit 1
          fi
          
          # Upload install.ps1 to the draft
          gh release upload ${{ env.RELEASE_TAG }} --repo Minions-Land/Magenta-CLI scripts/install.ps1 --clobber
          
          # Update release notes and finalize (draft=false)
          gh api /repos/Minions-Land/Magenta-CLI/releases/$RELEASE_ID -X PATCH \
            -f body="$(cat /tmp/release_notes.md)" \
            -F draft=false \
            -F prerelease=false
          
          echo "✅ Release ${{ env.RELEASE_TAG }} published"
        env:
          GH_TOKEN: ${{ secrets.MAGENTA_CLI_RELEASE_TOKEN }}
      
      - name: Release complete
        if: success()
        run: |
          echo "✅ Release ${{ steps.release_notes.outputs.version }} published to Minions-Land/Magenta-CLI"
          echo "📦 Artifacts:"
          ls -lh release/magenta-*
          echo ""
          echo "🔗 Download URL:"
          echo "   https://github.com/Minions-Land/Magenta-CLI/releases/tag/${{ steps.release_notes.outputs.version }}"

      # Draft release is now finalized; no cleanup needed since releases
      # don't consume Actions artifact storage quota.
