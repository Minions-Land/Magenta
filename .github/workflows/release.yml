name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to build and publish'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and stage release candidates
    runs-on: macos-15  # arm64 runner
    outputs:
      checksum_manifest_sha256: ${{ steps.checksums.outputs.manifest_sha256 }}
      release_tag: ${{ steps.release.outputs.tag }}
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - name: Validate release tag
        id: release
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be an exact vMAJOR.MINOR.PATCH value: $RELEASE_TAG" >&2
            exit 1
          fi
          printf 'tag=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: refs/tags/${{ steps.release.outputs.tag }}

      - name: Require an unused release destination
        env:
          GH_TOKEN: ${{ secrets.MAGENTA_CLI_RELEASE_TOKEN }}
        run: |
          if ! repository_write=$(gh api repos/Minions-Land/Magenta-CLI --jq '.permissions.push'); then
            echo "Could not verify release-repository access; refusing to publish." >&2
            exit 1
          fi
          if [ "$repository_write" != "true" ]; then
            echo "Release token lacks write access to Minions-Land/Magenta-CLI; refusing to publish." >&2
            exit 1
          fi

          lookup_dir=$(mktemp -d)
          trap 'rm -rf "$lookup_dir"' EXIT
          set +e
          gh api --include \
            "repos/Minions-Land/Magenta-CLI/releases/tags/$RELEASE_TAG" \
            >"$lookup_dir/response" 2>"$lookup_dir/error"
          lookup_status=$?
          set -e

          if [ "$lookup_status" -eq 0 ]; then
            cat >&2 <<EOF
          Refusing to overwrite the existing GitHub Release for $RELEASE_TAG.
          This workflow never deletes a release or its Git tag automatically.

          Recovery:
          - Inspect and preserve the existing draft, signatures, assets, and receipts.
          - For a published release, keep the tag immutable and prepare a new version.
          - For an abandoned draft, an authorized maintainer may remove only the
            GitHub Release object in the GitHub UI after audit; keep the Git tag.
          - Rerun this workflow only after the destination is intentionally unused.
          EOF
            exit 1
          fi

          if ! head -n 1 "$lookup_dir/response" | grep -Eq '^HTTP/[0-9.]+ 404 '; then
            echo "Could not prove that release destination $RELEASE_TAG is unused; refusing to publish." >&2
            cat "$lookup_dir/error" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22.19.0'
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'
      
      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          CLIPBOARD_STAGE=$(mktemp -d)
          trap 'rm -rf "$CLIPBOARD_STAGE"' EXIT
          node scripts/stage-release-clipboard.mjs --out "$CLIPBOARD_STAGE"
          mkdir -p node_modules/@mariozechner
          for PACKAGE in clipboard clipboard-darwin-universal clipboard-linux-x64-gnu clipboard-win32-x64-msvc; do
            rm -rf "node_modules/@mariozechner/$PACKAGE"
            cp -R "$CLIPBOARD_STAGE/@mariozechner/$PACKAGE" node_modules/@mariozechner/
          done
          rm -rf "$CLIPBOARD_STAGE"
          trap - EXIT

      - name: Clean-build testable workspaces
        run: |
          npm run clean
          npm run build:offline

      - name: Verify source build version identity
        run: |
          node scripts/verify-brand-version.mjs \
            --expected "${RELEASE_TAG#v}" \
            --require-dist

      - name: Run release checks and tests against the clean build
        run: |
          npm run check:release
          npm test
      
      - name: Verify embedded binaries
        run: |
          cd pi/coding-agent
          node scripts/check-process-tools.mjs
      
      - name: Build all platforms
        run: |
          cd pi/coding-agent
          npm run build:release-all

      - name: Verify release version identity
        run: |
          node scripts/verify-brand-version.mjs \
            --expected "${RELEASE_TAG#v}" \
            --require-dist \
            --resource-marker pi/coding-agent/dist/release/magenta-release.json

      - name: Create release tarball
        run: |
          cd pi/coding-agent/dist/release
          test -f magenta-release.json
          RESOURCE_VERSION=$(node -p "require('./magenta-release.json').version")
          test "$RESOURCE_VERSION" = "${RELEASE_TAG#v}"
          COPYFILE_DISABLE=1 tar -czf magenta-resources-universal.tar.gz \
            sandbox tools policy runtime skills theme assets \
            export-html docs examples package.json README.md \
            magenta-release.json \
            CHANGELOG.md ./*.wasm
          node --input-type=module <<'NODE'
          import { inspectReleaseResourceArchive } from "../utils/github-release-update-support.js";
          await inspectReleaseResourceArchive("magenta-resources-universal.tar.gz");
          NODE
          bun build --compile ../../scripts/clipboard-runtime-probe.ts --outfile magenta-clipboard-runtime-probe
          ./magenta-clipboard-runtime-probe
          rm magenta-clipboard-runtime-probe
      
      - name: Calculate checksums
        id: checksums
        run: |
          cp scripts/install.ps1 pi/coding-agent/dist/release/install.ps1
          git rev-parse HEAD > pi/coding-agent/dist/release/SOURCE_COMMIT
          cd pi/coding-agent/dist/release
          shasum -a 256 \
            magenta-macos-arm64 magenta-macos-x64 \
            magenta-linux-x64 magenta-windows-x64.exe \
            magenta-resources-universal.tar.gz install.ps1 SOURCE_COMMIT > SHA256SUMS
          cat SHA256SUMS
          echo "manifest_sha256=$(shasum -a 256 SHA256SUMS | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Atomically create the draft and upload release candidates
        env:
          GH_TOKEN: ${{ secrets.MAGENTA_CLI_RELEASE_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" \
            --repo Minions-Land/Magenta-CLI \
            --target main \
            --draft \
            --title "$RELEASE_TAG" \
            --notes "Pending verification..." \
            pi/coding-agent/dist/release/magenta-macos-arm64 \
            pi/coding-agent/dist/release/magenta-macos-x64 \
            pi/coding-agent/dist/release/magenta-linux-x64 \
            pi/coding-agent/dist/release/magenta-windows-x64.exe \
            pi/coding-agent/dist/release/magenta-resources-universal.tar.gz \
            pi/coding-agent/dist/release/install.ps1 \
            pi/coding-agent/dist/release/SOURCE_COMMIT \
            pi/coding-agent/dist/release/SHA256SUMS

  macos-signing-gate:
    name: Import notarized macOS release candidates
    needs: build
    runs-on: macos-15
    outputs:
      checksum_manifest_sha256: ${{ steps.signed_receipt.outputs.manifest_sha256 }}
    env:
      RELEASE_TAG: ${{ needs.build.outputs.release_tag }}

    steps:
      - name: Require organization signing integration
        id: signed_receipt
        run: |
          cat >&2 <<'EOF'
          macOS publication is fail-closed: the draft contains cross-compiled
          candidates, not verified macOS release assets. An organization-owned
          signing service must sign every embedded and packaged Mach-O payload
          plus both outer executables with a Developer ID Application certificate,
          notarize each architecture with Apple, and replace the affected draft
          binaries and universal resource archive.

          This repository does not define or guess certificate/notary secret
          names. Configure that integration in this job. It must bind its input
          to the build job's candidate manifest digest, sign embedded payloads
          before the final outer build/sign operation, replace both macOS draft
          binaries and the resource archive containing the native clipboard
          payload, prove all other assets are byte-identical to the build receipt,
          regenerate SHA256SUMS for the exact draft asset set, and write
          `manifest_sha256=<digest>` to GITHUB_OUTPUT before this
          deliberate failure is removed. Every smoke job consumes that new
          digest and waits for this job, so no platform can verify a mixture of
          pre-signing and post-signing assets. Ad-hoc signatures, a third-party
          Bun signature left in a modified executable, and checksum-only
          evidence are not release verification.
          EOF
          exit 1

  unix-installer-gate:
    name: Require a provenance-bound transactional Unix installer
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Require a source-owned Unix installer transaction
        run: |
          cat >&2 <<'EOF'
          Unix installer publication is fail-closed. The mutable install.sh in
          the public distribution repository is not owned by this source tag,
          is not covered by SOURCE_COMMIT or SHA256SUMS, and performs in-place
          resource copies that can leave a mixed installation after failure.

          Before removing this deliberate failure, add a reviewed source-owned
          install.sh to this repository and publish that exact tagged file as a
          Release asset. Include it in SHA256SUMS and the exact asset-set checks,
          bind it to the tagged source through SOURCE_COMMIT, and download the
          versioned Release asset instead of a mutable public main branch.

          The installer must share the built-in updater's per-installation lock,
          durably journal every activation phase, stage and validate the complete
          binary/resource layout before mutation, atomically replace the binary,
          and restore the complete previous resource set after any failure or
          interrupted activation. Native Linux and macOS fault-injection smoke
          tests must prove lock exclusion, journal recovery, binary atomicity,
          and full resource rollback before this gate may pass.
          EOF
          exit 1

  smoke-linux:
    name: Smoke test Linux x64 release
    needs: [build, macos-signing-gate]
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ needs.build.outputs.release_tag }}

    steps:
      - name: Download release assets from draft
        run: |
          gh release download "$RELEASE_TAG" --repo Minions-Land/Magenta-CLI --dir release --pattern '*'
        env:
          GH_TOKEN: ${{ secrets.MAGENTA_CLI_RELEASE_TOKEN }}

      - name: Verify build receipt and native executable
        run: |
          EXPECTED="${{ needs.macos-signing-gate.outputs.checksum_manifest_sha256 }}"
          ACTUAL=$(sha256sum release/SHA256SUMS | awk '{print $1}')
          test -n "$EXPECTED"
          test "$ACTUAL" = "$EXPECTED"
          (cd release && sha256sum -c SHA256SUMS)
          file release/magenta-linux-x64 | grep -Eq 'ELF 64-bit.*x86-64'
          chmod +x release/magenta-linux-x64
          test "$(release/magenta-linux-x64 --version)" = "${RELEASE_TAG#v}"
          release/magenta-linux-x64 --help >/dev/null

      - name: Install resources and exercise the installed native runtime
        run: |
          install_dir="$RUNNER_TEMP/magenta-linux-install"
          mkdir -p "$install_dir" "$RUNNER_TEMP/magenta-linux-home"
          tar -xzf release/magenta-resources-universal.tar.gz -C "$install_dir"
          install -m 0755 release/magenta-linux-x64 "$install_dir/magenta"
          test "$(HOME="$RUNNER_TEMP/magenta-linux-home" "$install_dir/magenta" --version)" = "${RELEASE_TAG#v}"
          HOME="$RUNNER_TEMP/magenta-linux-home" "$install_dir/magenta" --help --offline smoke >/dev/null
          process_tools="$install_dir/_magenta/process-tools/target/release/magenta-process-tools"
          test -x "$process_tools"
          "$process_tools" --help >/dev/null

  smoke-macos:
    name: Smoke test macOS ${{ matrix.arch }} release
    needs: [build, macos-signing-gate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            binary: magenta-macos-arm64
          - arch: x64
            runner: macos-15-intel
            binary: magenta-macos-x64
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ needs.build.outputs.release_tag }}

    steps:
      - name: Download release assets from draft
        run: |
          gh release download "$RELEASE_TAG" --repo Minions-Land/Magenta-CLI --dir release --pattern '*'
        env:
          GH_TOKEN: ${{ secrets.MAGENTA_CLI_RELEASE_TOKEN }}

      - name: Verify build receipt and native architecture
        run: |
          EXPECTED="${{ needs.macos-signing-gate.outputs.checksum_manifest_sha256 }}"
          ACTUAL=$(shasum -a 256 release/SHA256SUMS | awk '{print $1}')
          test -n "$EXPECTED"
          test "$ACTUAL" = "$EXPECTED"
          (cd release && shasum -a 256 -c SHA256SUMS)
          test "$(uname -m)" = "${{ matrix.arch == 'x64' && 'x86_64' || 'arm64' }}"
          file "release/${{ matrix.binary }}" | grep -q "Mach-O 64-bit executable ${{ matrix.arch == 'x64' && 'x86_64' || 'arm64' }}"

      - name: Require Developer ID and online notarization evidence
        run: |
          binary="release/${{ matrix.binary }}"
          codesign --verify --strict --verbose=2 \
            --test-requirement '=anchor apple generic and certificate leaf[field.1.2.840.113635.100.6.1.13] exists' \
            "$binary"
          codesign --verify --strict --check-notarization --verbose=2 "$binary"
          spctl --assess --type execute --verbose=4 "$binary"
          signature=$(codesign --display --verbose=4 "$binary" 2>&1)
          grep -q '^Authority=Developer ID Application:' <<<"$signature"
          grep -Eq '^TeamIdentifier=[A-Z0-9]+$' <<<"$signature"
          ! grep -q '^Signature=adhoc$' <<<"$signature"

      - name: Install resources and exercise the installed native runtime
        run: |
          install_dir="$RUNNER_TEMP/magenta-macos-install"
          mkdir -p "$install_dir" "$RUNNER_TEMP/magenta-macos-home"
          tar -xzf release/magenta-resources-universal.tar.gz -C "$install_dir"
          install -m 0755 "release/${{ matrix.binary }}" "$install_dir/magenta"
          test "$(HOME="$RUNNER_TEMP/magenta-macos-home" "$install_dir/magenta" --version)" = "${RELEASE_TAG#v}"
          HOME="$RUNNER_TEMP/magenta-macos-home" "$install_dir/magenta" --help --offline smoke >/dev/null
          process_tools="$install_dir/_magenta/process-tools/target/release/magenta-process-tools"
          test -x "$process_tools"
          "$process_tools" --help >/dev/null
          verified_macho=0
          while IFS= read -r -d '' payload; do
            if ! file "$payload" | grep -q 'Mach-O'; then
              continue
            fi
            codesign --verify --strict --verbose=2 \
              --test-requirement '=anchor apple generic and certificate leaf[field.1.2.840.113635.100.6.1.13] exists' \
              "$payload"
            payload_signature=$(codesign --display --verbose=4 "$payload" 2>&1)
            grep -q '^Authority=Developer ID Application:' <<<"$payload_signature"
            grep -Eq '^TeamIdentifier=[A-Z0-9]+$' <<<"$payload_signature"
            if grep -q '^Signature=adhoc$' <<<"$payload_signature"; then
              echo "Ad-hoc signature is not allowed: $payload" >&2
              exit 1
            fi
            verified_macho=$((verified_macho + 1))
          done < <(find "$install_dir" -type f -print0)
          test "$verified_macho" -ge 3

  smoke-windows:
    name: Smoke test Windows release
    needs: [build, macos-signing-gate]
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ needs.build.outputs.release_tag }}

    steps:
      - name: Download release assets from draft
        shell: powershell
        run: |
          gh release download "$env:RELEASE_TAG" --repo Minions-Land/Magenta-CLI --dir release --pattern '*'
        env:
          GH_TOKEN: ${{ secrets.MAGENTA_CLI_RELEASE_TOKEN }}

      - name: Verify build checksum receipt and assets
        shell: powershell
        run: |
          $expectedManifest = "${{ needs.macos-signing-gate.outputs.checksum_manifest_sha256 }}"
          $actualManifest = (Get-FileHash -Algorithm SHA256 -Path "release\SHA256SUMS").Hash.ToLowerInvariant()
          if (-not $expectedManifest -or $actualManifest -ne $expectedManifest) {
            throw "Draft checksum manifest does not match the build job receipt"
          }

          $expectedNames = @(
            "SOURCE_COMMIT",
            "install.ps1",
            "magenta-linux-x64",
            "magenta-macos-arm64",
            "magenta-macos-x64",
            "magenta-resources-universal.tar.gz",
            "magenta-windows-x64.exe"
          ) | Sort-Object
          $entries = Get-Content -LiteralPath "release\SHA256SUMS" | ForEach-Object {
            if ($_ -notmatch '^([0-9a-fA-F]{64})\s+\*?(.+)$') {
              throw "Invalid SHA256SUMS entry: $_"
            }
            [PSCustomObject]@{ Hash = $Matches[1].ToLowerInvariant(); Name = $Matches[2] }
          }
          $actualNames = @($entries | ForEach-Object Name | Sort-Object)
          if (Compare-Object -ReferenceObject $expectedNames -DifferenceObject $actualNames) {
            throw "Draft release asset set does not match the build contract"
          }
          foreach ($entry in $entries) {
            $actualHash = (Get-FileHash -Algorithm SHA256 -Path (Join-Path "release" $entry.Name)).Hash.ToLowerInvariant()
            if ($actualHash -ne $entry.Hash) {
              throw "Checksum mismatch for $($entry.Name)"
            }
          }

      - name: Parse Windows installer
        shell: powershell
        run: |
          $tokens = $null
          $parseErrors = $null
          $installerPath = (Resolve-Path ".\release\install.ps1").Path
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            $installerPath,
            [ref]$tokens,
            [ref]$parseErrors
          )
          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Error $_.Message }
            throw "install.ps1 failed PowerShell syntax validation"
          }

      - name: Install resources and start Magenta
        shell: powershell
        run: |
          $tempRoot = [System.IO.Path]::GetPathRoot([System.IO.Path]::GetTempPath())
          $alternateDrive = Get-PSDrive -PSProvider FileSystem |
            Where-Object { $_.Root -and $_.Root -ne $tempRoot -and $_.Free -gt 1GB } |
            Select-Object -First 1
          if ($alternateDrive) {
            $installDir = Join-Path $alternateDrive.Root ("MagentaSmoke-" + [Guid]::NewGuid().ToString("N"))
            Write-Host "Testing cross-volume install from TEMP $tempRoot to $installDir"
          } else {
            $installDir = Join-Path $env:RUNNER_TEMP ("MagentaSmoke-" + [Guid]::NewGuid().ToString("N"))
            Write-Host "No alternate filesystem drive available; installing to $installDir"
          }
          "MAGENTA_SMOKE_INSTALL_DIR=$installDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $server = Start-Process python -ArgumentList "-m", "http.server", "8765", "--directory", "release" -PassThru
          try {
            $serverReady = $false
            for ($attempt = 0; $attempt -lt 30; $attempt++) {
              try {
                Invoke-WebRequest -UseBasicParsing -Method Head -TimeoutSec 1 -Uri "http://127.0.0.1:8765/SHA256SUMS" | Out-Null
                $serverReady = $true
                break
              } catch {
                Start-Sleep -Milliseconds 500
              }
            }
            if (-not $serverReady) { throw "Timed out waiting for the local release asset server" }
            & ".\release\install.ps1" -InstallDir $installDir -AssetBaseUrl "http://127.0.0.1:8765"

            # Model a power loss after one old resource moved to backup but
            # before replacement activation. The next installer run must use
            # the durable journal to restore it, then complete a normal update.
            $operationId = "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
            $installParent = Split-Path -Parent $installDir
            $installLeaf = Split-Path -Leaf $installDir
            $stagingDir = Join-Path $installParent (".$installLeaf.staging-$operationId")
            $backupDir = Join-Path $installParent (".$installLeaf.backup-$operationId")
            $journalPath = Join-Path $installDir ".magenta-install-update.json"
            $ownershipMarkerName = ".magenta-installer-transaction.json"
            New-Item -ItemType Directory -Path $stagingDir | Out-Null
            New-Item -ItemType Directory -Path $backupDir | Out-Null
            $oldEntryNames = @(
              Get-ChildItem -LiteralPath $installDir -Force |
                Where-Object { $_.Name -ne ".magenta-install-update.lock" } |
                ForEach-Object Name
            )
            Copy-Item -LiteralPath (Join-Path $installDir "magenta.exe") -Destination (Join-Path $stagingDir "magenta.exe")
            Move-Item -LiteralPath (Join-Path $installDir "README.md") -Destination (Join-Path $backupDir "README.md")
            foreach ($marker in @(
              @{ Directory = $stagingDir; Role = "staging" },
              @{ Directory = $backupDir; Role = "backup" }
            )) {
              [ordered]@{
                schemaVersion = 1
                operationId = $operationId
                installDir = $installDir
                role = $marker.Role
              } | ConvertTo-Json -Compress | Set-Content -LiteralPath (Join-Path $marker.Directory $ownershipMarkerName) -Encoding UTF8
            }
            $installedVersion = (& (Join-Path $installDir "magenta.exe") --version).Trim()
            [ordered]@{
              schemaVersion = 1
              operationId = $operationId
              installDir = $installDir
              phase = "resources_backed_up"
              stagingDir = $stagingDir
              backupDir = $backupDir
              hadPreviousInstall = $true
              hadPreviousBinary = $true
              oldEntryNames = $oldEntryNames
              newEntryNames = $oldEntryNames
              expectedBinarySha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $installDir "magenta.exe")).Hash.ToLowerInvariant()
              targetVersion = $installedVersion
            } | ConvertTo-Json -Depth 4 -Compress | Set-Content -LiteralPath $journalPath -Encoding UTF8

            & ".\release\install.ps1" -InstallDir $installDir -AssetBaseUrl "http://127.0.0.1:8765"
            if (Test-Path -LiteralPath $journalPath) { throw "Windows installer left its recovery journal behind" }
            if (Test-Path -LiteralPath "$journalPath.tmp") { throw "Windows installer left a journal write behind" }
            if (Test-Path -LiteralPath (Join-Path $installDir $ownershipMarkerName)) { throw "Windows installer left an active ownership marker behind" }
            if (Test-Path -LiteralPath (Join-Path $installDir ".magenta-install-update.lock")) { throw "Windows installer left its shared lock behind" }
            if (Test-Path -LiteralPath $stagingDir) { throw "Windows installer left interrupted staging behind" }
            if (Test-Path -LiteralPath $backupDir) { throw "Windows installer left interrupted backup behind" }
            if (-not (Test-Path -LiteralPath (Join-Path $installDir "README.md") -PathType Leaf)) { throw "Windows installer did not restore the interrupted resource move" }

            # Model a power loss after the prepared journal and empty backup
            # directory reached disk, but before the ownership marker write.
            # Recovery may remove only that exact empty, journal-bound path.
            $preparedOperationId = "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
            $preparedStagingDir = Join-Path $installParent (".$installLeaf.staging-$preparedOperationId")
            $preparedBackupDir = Join-Path $installParent (".$installLeaf.backup-$preparedOperationId")
            $preparedEntryNames = @(
              Get-ChildItem -LiteralPath $installDir -Force |
                Where-Object { $_.Name -ne ".magenta-install-update.lock" } |
                ForEach-Object Name
            )
            New-Item -ItemType Directory -Path $preparedBackupDir | Out-Null
            $preparedInstalledVersion = (& (Join-Path $installDir "magenta.exe") --version).Trim()
            [ordered]@{
              schemaVersion = 1
              operationId = $preparedOperationId
              installDir = $installDir
              phase = "prepared"
              stagingDir = $preparedStagingDir
              backupDir = $preparedBackupDir
              hadPreviousInstall = $true
              hadPreviousBinary = $true
              oldEntryNames = $preparedEntryNames
              newEntryNames = $preparedEntryNames
              expectedBinarySha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $installDir "magenta.exe")).Hash.ToLowerInvariant()
              targetVersion = $preparedInstalledVersion
            } | ConvertTo-Json -Depth 4 -Compress | Set-Content -LiteralPath $journalPath -Encoding UTF8

            & ".\release\install.ps1" -InstallDir $installDir -AssetBaseUrl "http://127.0.0.1:8765"
            if (Test-Path -LiteralPath $journalPath) { throw "Windows installer left its prepared recovery journal behind" }
            if (Test-Path -LiteralPath $preparedBackupDir) { throw "Windows installer left its empty unmarked prepared backup behind" }
            if (Test-Path -LiteralPath $preparedStagingDir) { throw "Windows installer created unexpected prepared staging state" }

            # An InstallDir may be shared accidentally. Unknown top-level data
            # must block both replacement and uninstall before either mutates it.
            # A plausible but unowned WASM filename is deliberately used here:
            # extension-wide allowlists would silently delete it.
            $keepPath = Join-Path $installDir "user-notes.wasm"
            "preserve me" | Set-Content -LiteralPath $keepPath -Encoding Ascii
            $binaryBeforeUnmanagedChecks = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $installDir "magenta.exe")).Hash
            $rejectedUnmanagedInstall = $false
            try {
              & ".\release\install.ps1" -InstallDir $installDir -AssetBaseUrl "http://127.0.0.1:8765"
            } catch {
              if ($_.Exception.Message -notmatch "unmanaged top-level entry") { throw }
              $rejectedUnmanagedInstall = $true
            }
            if (-not $rejectedUnmanagedInstall) { throw "Windows installer accepted an unmanaged top-level file" }
            $rejectedUnmanagedUninstall = $false
            try {
              & ".\release\install.ps1" -InstallDir $installDir -Uninstall
            } catch {
              if ($_.Exception.Message -notmatch "unmanaged top-level entry") { throw }
              $rejectedUnmanagedUninstall = $true
            }
            if (-not $rejectedUnmanagedUninstall) { throw "Windows uninstaller accepted an unmanaged top-level file" }
            if ((Get-Content -LiteralPath $keepPath -Raw).Trim() -ne "preserve me") { throw "Windows installer changed unmanaged data" }
            $binaryAfterUnmanagedChecks = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $installDir "magenta.exe")).Hash
            if ($binaryAfterUnmanagedChecks -ne $binaryBeforeUnmanagedChecks) { throw "Windows installer mutated Magenta before unmanaged-data rejection" }
            if (Test-Path -LiteralPath $journalPath) { throw "Windows installer journaled an unmanaged-data rejection" }
            if (Test-Path -LiteralPath (Join-Path $installDir ".magenta-install-update.lock")) { throw "Windows installer left its lock after unmanaged-data rejection" }
            Remove-Item -LiteralPath $keepPath -Force

            # Even allowlisted names such as README.md and docs are generic.
            # A non-empty directory without magenta.exe has no installation
            # ownership evidence and must remain byte-for-byte untouched.
            $genericDir = "$installDir-generic-managed-names"
            New-Item -ItemType Directory -Path (Join-Path $genericDir "docs") -Force | Out-Null
            "generic readme" | Set-Content -LiteralPath (Join-Path $genericDir "README.md") -Encoding Ascii
            "user document" | Set-Content -LiteralPath (Join-Path $genericDir "docs\user.txt") -Encoding Ascii
            $rejectedGenericInstall = $false
            try {
              & ".\release\install.ps1" -InstallDir $genericDir -AssetBaseUrl "http://127.0.0.1:8765"
            } catch {
              if ($_.Exception.Message -notmatch "managed-looking data but no Magenta executable") { throw }
              $rejectedGenericInstall = $true
            }
            if (-not $rejectedGenericInstall) { throw "Windows installer accepted generic managed-looking data without ownership evidence" }
            $rejectedGenericUninstall = $false
            try {
              & ".\release\install.ps1" -InstallDir $genericDir -Uninstall
            } catch {
              if ($_.Exception.Message -notmatch "managed-looking data but no Magenta executable") { throw }
              $rejectedGenericUninstall = $true
            }
            if (-not $rejectedGenericUninstall) { throw "Windows uninstaller accepted generic managed-looking data without ownership evidence" }
            if ((Get-Content -LiteralPath (Join-Path $genericDir "README.md") -Raw).Trim() -ne "generic readme") { throw "Windows installer changed generic README data" }
            if ((Get-Content -LiteralPath (Join-Path $genericDir "docs\user.txt") -Raw).Trim() -ne "user document") { throw "Windows installer changed generic docs data" }
            if (Test-Path -LiteralPath (Join-Path $genericDir "magenta.exe")) { throw "Windows installer added a binary before ownership rejection" }
            if (Test-Path -LiteralPath (Join-Path $genericDir ".magenta-install-update.json")) { throw "Windows installer journaled a generic-data rejection" }
            if (Test-Path -LiteralPath (Join-Path $genericDir ".magenta-install-update.lock")) { throw "Windows installer left its lock after generic-data rejection" }
            Remove-Item -LiteralPath $genericDir -Recurse -Force

            # The installer must inspect the archive before extraction. A
            # checksum-valid tar containing a top-level magenta.exe could
            # otherwise overwrite the binary that was verified above.
            $env:MAGENTA_MALICIOUS_ARCHIVE = Join-Path $PWD "release\magenta-resources-universal.tar.gz"
            $maliciousArchiveScript = @'
          import io
          import os
          import tarfile

          payload = b"not the verified Magenta binary"
          info = tarfile.TarInfo("magenta.exe")
          info.size = len(payload)
          with tarfile.open(os.environ["MAGENTA_MALICIOUS_ARCHIVE"], "w:gz") as archive:
              archive.addfile(info, io.BytesIO(payload))
          '@
            $maliciousArchiveScript | python -
            $binaryHash = (Get-FileHash -Algorithm SHA256 -Path "release\magenta-windows-x64.exe").Hash.ToLowerInvariant()
            $resourceHash = (Get-FileHash -Algorithm SHA256 -Path $env:MAGENTA_MALICIOUS_ARCHIVE).Hash.ToLowerInvariant()
            @(
              "$binaryHash  magenta-windows-x64.exe",
              "$resourceHash  magenta-resources-universal.tar.gz"
            ) | Set-Content -LiteralPath "release\SHA256SUMS" -Encoding Ascii
            $rejectedUnsafeArchive = $false
            try {
              $rejectedInstallDir = "$installDir-reject-unsafe-archive"
              & ".\release\install.ps1" -InstallDir $rejectedInstallDir -AssetBaseUrl "http://127.0.0.1:8765"
            } catch {
              if ($_.Exception.Message -notmatch "unknown top-level path: magenta.exe") { throw }
              $rejectedUnsafeArchive = $true
            }
            if (-not $rejectedUnsafeArchive) { throw "Windows installer accepted an unsafe resource archive" }
          } finally {
            Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
          }
          & "$installDir\magenta.exe" --help | Out-File -FilePath magenta-help.txt -Encoding utf8
          if ($LASTEXITCODE -ne 0) { throw "Installed Magenta failed with exit code $LASTEXITCODE" }

      - name: Start installed binary from PowerShell 7
        shell: pwsh
        run: |
          & "$env:MAGENTA_SMOKE_INSTALL_DIR\magenta.exe" --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Installed Magenta failed under PowerShell 7 with exit code $LASTEXITCODE" }

      - name: Start installed binary from Git Bash
        shell: bash
        run: |
          install_dir="$(cygpath -u "$MAGENTA_SMOKE_INSTALL_DIR")"
          "$install_dir/magenta.exe" --help >/dev/null

  publish:
    name: Publish platform-gated release
    needs: [build, macos-signing-gate, unix-installer-gate, smoke-linux, smoke-macos, smoke-windows]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.build.outputs.release_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Download platform-gated release assets from draft
        run: |
          test "$(gh release view "$RELEASE_TAG" --repo Minions-Land/Magenta-CLI --json isDraft --jq .isDraft)" = "true"
          gh release download "$RELEASE_TAG" --repo Minions-Land/Magenta-CLI --dir release --pattern '*'
          EXPECTED="${{ needs.macos-signing-gate.outputs.checksum_manifest_sha256 }}"
          ACTUAL=$(sha256sum release/SHA256SUMS | awk '{print $1}')
          test -n "$EXPECTED"
          test "$ACTUAL" = "$EXPECTED"
          EXPECTED_ASSETS=$(printf '%s\n' SHA256SUMS SOURCE_COMMIT install.ps1 magenta-linux-x64 magenta-macos-arm64 magenta-macos-x64 magenta-resources-universal.tar.gz magenta-windows-x64.exe | sort)
          ACTUAL_ASSETS=$(find release -maxdepth 1 -type f -printf '%f\n' | sort)
          test "$ACTUAL_ASSETS" = "$EXPECTED_ASSETS"
          (cd release && sha256sum -c SHA256SUMS)
          test "$(cat release/SOURCE_COMMIT)" = "$(git rev-parse HEAD)"
        env:
          GH_TOKEN: ${{ secrets.MAGENTA_CLI_RELEASE_TOKEN }}

      - name: Extract release notes
        id: release_notes
        run: |
          VERSION="${RELEASE_TAG}"
          RELEASE_NOTES_PATH="$RUNNER_TEMP/magenta-release-notes.md"
          export RELEASE_NOTES_PATH
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          RELEASE_NOTES_VERSION="${VERSION#v}" node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          import { extractReleaseNotes } from "./scripts/release.mjs";

          const version = process.env.RELEASE_NOTES_VERSION;
          const outputPath = process.env.RELEASE_NOTES_PATH;
          if (!outputPath) throw new Error("RELEASE_NOTES_PATH is required");
          const changelog = readFileSync("pi/coding-agent/CHANGELOG.md", "utf8");
          writeFileSync(outputPath, extractReleaseNotes(changelog, version), { mode: 0o600 });
          NODE
          printf '\nSource commit: https://github.com/Minions-Land/Magenta/commit/%s\n' "$(cat release/SOURCE_COMMIT)" >> "$RELEASE_NOTES_PATH"
      
      - name: Finalize GitHub Release
        run: |
          RELEASE_NOTES_PATH="$RUNNER_TEMP/magenta-release-notes.md"
          test -f "$RELEASE_NOTES_PATH"
          # Get the verified draft release ID without interpolating the tag into jq.
          RELEASE_ID=$(gh release view "$RELEASE_TAG" --repo Minions-Land/Magenta-CLI \
            --json databaseId,isDraft --jq 'select(.isDraft == true) | .databaseId')
          if [ -z "$RELEASE_ID" ]; then
            echo "Error: Draft release $RELEASE_TAG not found"
            exit 1
          fi

          # Update release notes and finalize (draft=false).
          gh api "/repos/Minions-Land/Magenta-CLI/releases/$RELEASE_ID" -X PATCH \
            -f body="$(cat "$RELEASE_NOTES_PATH")" \
            -F draft=false \
            -F prerelease=false

          echo "Release $RELEASE_TAG published"
        env:
          GH_TOKEN: ${{ secrets.MAGENTA_CLI_RELEASE_TOKEN }}
      
      - name: Release complete
        if: success()
        run: |
          echo "✅ Release ${{ steps.release_notes.outputs.version }} published to Minions-Land/Magenta-CLI"
          echo "📦 Artifacts:"
          ls -lh release/magenta-*
          echo ""
          echo "🔗 Download URL:"
          echo "   https://github.com/Minions-Land/Magenta-CLI/releases/tag/${{ steps.release_notes.outputs.version }}"

      # Draft release is now finalized; no cleanup needed since releases
      # don't consume Actions artifact storage quota.
