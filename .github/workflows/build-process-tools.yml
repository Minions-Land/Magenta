name: Build magenta-process-tools

on:
  workflow_dispatch:
  push:
    paths:
      - 'HarnessComponentProtocol/_magenta/process-tools/**'
      - '.github/workflows/build-process-tools.yml'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: magenta-process-tools-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: magenta-process-tools-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: magenta-process-tools-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: magenta-process-tools-windows-x64.exe

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl linker
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Cache Rust dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            HarnessComponentProtocol/_magenta/process-tools/target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('HarnessComponentProtocol/_magenta/process-tools/Cargo.lock') }}
      
      - name: Build process-tools
        working-directory: HarnessComponentProtocol/_magenta/process-tools
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Verify portable Linux binary
        if: matrix.target == 'x86_64-unknown-linux-musl'
        working-directory: HarnessComponentProtocol/_magenta/process-tools
        run: |
          binary=target/${{ matrix.target }}/release/magenta-process-tools
          file "$binary"
          ! readelf -l "$binary" | grep -q 'Requesting program interpreter'
          ! strings "$binary" | grep -Eq 'GLIBC_[0-9]'
          "$binary" --help >/dev/null

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        working-directory: HarnessComponentProtocol/_magenta/process-tools
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/magenta-process-tools artifacts/${{ matrix.artifact }}
          chmod +x artifacts/${{ matrix.artifact }}
      
      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        working-directory: HarnessComponentProtocol/_magenta/process-tools
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item target/${{ matrix.target }}/release/magenta-process-tools.exe artifacts/${{ matrix.artifact }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: HarnessComponentProtocol/_magenta/process-tools/artifacts/${{ matrix.artifact }}
          if-no-files-found: error
          # Intermediate build stage hand-off to the collect job. The authoritative
          # prebuilt binaries live in the source tree after collect commits them.
          retention-days: 1
          compression-level: 9

  collect:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      
      - name: Organize binaries and write receipt
        run: |
          prebuilt=HarnessComponentProtocol/_magenta/process-tools/prebuilt
          mkdir -p "$prebuilt"
          find artifacts -type f -exec cp {} "$prebuilt"/ \;
          cd "$prebuilt"
          sha256sum magenta-process-tools-* > SHA256SUMS
          sha256sum -c SHA256SUMS
          ls -lh
      
      - name: Upload collected binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: all-process-tools-binaries
          path: HarnessComponentProtocol/_magenta/process-tools/prebuilt/
          retention-days: 1
          compression-level: 9

      # The per-platform binaries are only an intermediate hand-off to this
      # collect job; the merged all-process-tools-binaries bundle is what a
      # maintainer downloads to commit. Prune the intermediates to keep the
      # Actions storage quota clear; retention-days=1 is the backstop.
      - name: Prune per-platform build artifacts
        if: always()
        uses: geekyeggo/delete-artifact@f275313e70c08f6120db482d7a6b98377786765b # v5
        with:
          name: |
            magenta-process-tools-macos-arm64
            magenta-process-tools-macos-x64
            magenta-process-tools-linux-x64
            magenta-process-tools-windows-x64.exe
          failOnError: false
