name = "magenta-harness"
description = "Magenta3 harness component registry: pure-execution tools plus the HCP/HcpMagnet assembly layer."

[[components]]
kind = "tool"
name = "bash"
description = "Execute a bash command in the current working directory."
path = "modules/tools/bash/bash.toml"

[[components]]
kind = "tool"
name = "edit"
description = "Apply one or more targeted text replacements to a file."
path = "modules/tools/edit/edit.toml"

[[components]]
kind = "tool"
name = "read"
description = "Read the contents of a file with optional line offset/limit."
path = "modules/tools/read/read.toml"

[[components]]
kind = "tool"
name = "write"
description = "Write content to a file, creating parent directories as needed."
path = "modules/tools/write/write.toml"

[[components]]
kind = "tool"
name = "grep"
description = "Search file contents for a pattern (respects .gitignore)."
path = "modules/tools/grep/grep.toml"

[[components]]
kind = "tool"
name = "find"
description = "Find files matching a glob pattern."
path = "modules/tools/find/find.toml"

[[components]]
kind = "tool"
name = "ls"
description = "List directory entries."
path = "modules/tools/ls/ls.toml"

[[components]]
kind = "tool"
name = "lsp"
description = "LSP-style language intelligence queries using the Magenta process-tool source."
path = "modules/tools/lsp/lsp.toml"

[[components]]
kind = "tool"
name = "todo"
description = "Manage a session-scoped todo list with branching support."
path = "modules/tools/todo/todo.toml"

[[components]]
kind = "tool"
name = "ssh"
description = "SSH-backed remote workspace operations for read, write, edit, and bash."
path = "modules/tools/ssh/ssh.toml"

[[components]]
kind = "tool"
name = "web-search"
description = "Search the web using the Magenta process-tool source."
path = "modules/tools/web-search/web-search.toml"

[[components]]
kind = "tool"
name = "web-fetch"
description = "Fetch a web page using the Magenta process-tool source."
path = "modules/tools/web-fetch/web-fetch.toml"

[[components]]
kind = "hcp-process"
name = "hcp-process"
description = "HCP JSONL process manifests migrated from Magenta1 general-harness."
path = "harness-component-protocol/hcp-process/hcp-process.toml"

[[components]]
kind = "sandbox"
name = "sandbox"
description = "Sandbox profiles and selection provider migrated from Magenta1 general-harness."
path = "modules/sandbox/sandbox.toml"

[[components]]
kind = "runtime"
name = "process"
description = "Process runtime provider with portable sandbox guardrails."
path = "modules/runtime/runtime.toml"

[[components]]
kind = "runtime"
name = "script-runtimes"
description = "Shell/Python/Node/R/Julia runtime wrappers compiled to runtime://process."
path = "modules/runtime/script-runtimes.toml"

[[components]]
kind = "hook"
name = "hooks"
description = "Lifecycle hook provider migrated from Magenta1 general-harness."
path = "modules/hooks/hooks.toml"

[[components]]
kind = "policy"
name = "policy"
description = "Approval and shell policy providers migrated from Magenta1 general-harness."
path = "modules/policy/policy.toml"

[[components]]
kind = "context"
name = "workspace"
description = "Workspace context provider migrated from Magenta1 general-harness."
path = "modules/context/context.toml"

# Core modules
[[components]]
kind = "compaction"
name = "compaction"
description = "Branch summarization and context compaction for agent loop memory management."
path = "modules/compaction/compaction.toml"

[[components]]
kind = "prompt-template"
name = "prompt-templates"
description = "Reusable prompt templates with parameter substitution and formatting."
path = "modules/prompt-templates/prompt-templates.toml"

[[components]]
kind = "skill"
name = "skills"
description = "Agent skills - user-invocable capabilities via /skill command."
path = "modules/skills/skills.toml"

[[components]]
kind = "system-prompt"
name = "system-prompt"
description = "System prompt construction and templating for agent context."
path = "modules/system-prompt/system-prompt.toml"

[[components]]
kind = "session"
name = "session"
description = "Session management with jsonl and memory storage backends."
path = "core/session/session.toml"

[[components]]
kind = "env"
name = "env"
description = "Environment adapters for Node.js runtime integration."
path = "core/env/env.toml"

[[components]]
kind = "util"
name = "utils"
description = "Shared utilities for shell output formatting and text truncation."
path = "core/utils/utils.toml"

[[components]]
kind = "contract"
name = "messages"
description = "Agent message contracts and conversion utilities shared across harness modules."
path = "core/messages/messages.toml"

[[components]]
kind = "contract"
name = "types"
description = "Shared harness type contracts, result helpers, execution environment, and errors."
path = "core/types/types.toml"

[[components]]
kind = "memory"
name = "memory"
description = "Embedding-based semantic memory storage and retrieval."
path = "modules/memory/memory.toml"

[[components]]
kind = "assembly"
name = "package-overlay"
description = "Harness package overlay discovery and profile selection. Actual package contents live in the repository-level packages/ root."
path = "harness-component-protocol/overlay/package-overlay.toml"

# Assembly layer
[[components]]
kind = "assembly"
name = "hcp"
description = "Harness Component Protocol - management and discovery layer."
path = "harness-component-protocol/harness-component-protocol.toml"

[[components]]
kind = "assembly"
name = "magnet"
description = "Connectors that wrap implementations as AgentTools or HCP targets."
path = "hcp-magnet/magnet.toml"

[[components]]
kind = "assembly"
name = "registry"
description = "TOML registry loader and component discovery."
path = "harness-component-protocol/registry/registry.toml"

