kind = "process"
name = "EditHashline"
description = "Apply a hashline anchored patch to one file. Rejects stale file tags before writing."
command = "process-tools/target/release/magenta-process-tools"
args = ["edit-hashline"]
operation = "edit"
read_only = false
destructive = false
version = "1.0.0"
tags = ["filesystem", "io", "edit", "hashline", "workspace-write"]
capabilities = ["line-anchored-patch", "content-hash", "stale-edit-guard", "dry-run"]
requires = []

[parameters]
type = "object"
required = ["file_path", "patch"]

[parameters.properties.file_path]
type = "string"
description = "Absolute path to the file. Must match the patch section path."

[parameters.properties.patch]
type = "string"
description = "Hashline patch. Supported operations: SWAP A.=B, DEL A.=B, INS.HEAD, INS.TAIL, INS.PRE A, INS.POST A."

[parameters.properties.dry_run]
type = "boolean"
description = "Validate and preview the patch without writing"
default = false
