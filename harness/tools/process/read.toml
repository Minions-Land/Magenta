kind = "process"
name = "Read"
description = "Read the contents of a file. Supports offset and limit for partial reads. Returns file with line numbers."
command = "process-tools/target/release/magenta-process-tools"
args = ["read"]
operation = "read"
read_only = true
destructive = false
version = "1.0.0"
tags = ["filesystem", "io", "read"]
capabilities = ["text", "streaming", "partial-read"]
requires = []

[parameters]
type = "object"
required = ["file_path"]

[parameters.properties.file_path]
type = "string"
description = "Absolute path to the file"

[parameters.properties.offset]
type = "integer"
description = "Line number to start from (0-based)"

[parameters.properties.limit]
type = "integer"
description = "Max lines to read (default: 2000)"
