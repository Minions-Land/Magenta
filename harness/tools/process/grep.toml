kind = "process"
name = "Grep"
description = "Search for patterns in files using regex. Recursively searches directories up to depth 10."
command = "process-tools/target/release/magenta-process-tools"
args = ["grep"]
operation = "read"
read_only = true
destructive = false
version = "1.0.0"
tags = ["filesystem", "search", "regex", "text-processing"]
capabilities = ["regex", "recursive", "file-filter"]
requires = []

[parameters]
type = "object"
required = ["pattern"]

[parameters.properties.pattern]
type = "string"
description = "Regex pattern to search for"

[parameters.properties.path]
type = "string"
description = "Path to search in (default: current directory)"

[parameters.properties.file_pattern]
type = "string"
description = "Regex pattern to filter file names (optional)"

[parameters.properties.case_sensitive]
type = "boolean"
description = "Case-sensitive search (default: true)"
