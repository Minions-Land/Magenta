kind = "process"
name = "FuzzyFind"
description = "Fuzzy path lookup under a directory. Returns score-tab-path rows sorted by best match."
command = "tools/fuzzy-find/magenta/process-tools/target/release/magenta-process-tools"
args = ["fuzzy-find"]
operation = "read"
read_only = true
destructive = false
version = "1.0.0"
tags = ["filesystem", "discovery", "fuzzy", "path-search"]
capabilities = ["fuzzy-path-search", "path-discovery", "file-type-filter"]
requires = []

[parameters]
type = "object"
required = ["query"]

[parameters.properties.query]
type = "string"
description = "Fuzzy path query"

[parameters.properties.path]
type = "string"
description = "Directory to search (default: current workspace)"

[parameters.properties.file_type]
type = "string"
description = "Optional type filter: file, dir, or link"

[parameters.properties.include_hidden]
type = "boolean"
description = "Include hidden files/directories"
default = false

[parameters.properties.include_node_modules]
type = "boolean"
description = "Include node_modules directories"
default = false

[parameters.properties.limit]
type = "integer"
description = "Maximum results"
default = 100
