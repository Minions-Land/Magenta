kind = "multiagent"
name = "multiagent"
description = "Workflow orchestration engine with a single execution path: load a workflow module, inject primitives (agent/parallelAgents/guards), run it. Six named patterns are preset scripts shipped in-tree; the 'script' pattern loads user-authored modules. Both run through the same path, so choosing a preset and writing your own workflow differ only in where the module comes from."
source = "magenta"
origin = "magenta1-general-harness"
origin_rel = "ported/adapted"
impl = ["multiagent/workflow/magenta/orchestrator.ts", "multiagent/workflow/magenta/worker.ts", "multiagent/workflow/magenta/magnet.ts"]
targets = ["multiagent://local"]

[assumption]
compensates = "The model tends to skip the disciplined 'soul step' of a procedure (classify-first, cover-every, independent re-check) and cannot reliably control its own flow or termination, so presets enforce control flow and inject guard prompts in code."
rationale = "stated"  # orchestrator.ts comment: "The LLM ... never decides the order, the concurrency, or when to stop"
calibrated_for = ["claude-sonnet-4-5", "claude-opus-4-5"]
review_trigger = "model-change"
load_bearing = "unmeasured"
eval_scenarios = []

[[patterns]]
name = "classify_and_act"
description = "Classify mixed input first, then route each item to a type-specific handler. Forces the classify step that a generic 'handle these' prompt would skip."

[[patterns]]
name = "fan_out_synthesize"
description = "Run the same check over every object in parallel, then merge into one consolidated artifact. For every/all tasks that end in a single report."

[[patterns]]
name = "adversarial_verify"
description = "Generator casts a wide net for candidates; independent verifiers re-check each; only confirmed findings pass. For high false-positive-cost work (security, compliance)."

[[patterns]]
name = "generate_and_filter"
description = "Independent candidates generated in parallel, then scored by quantifiable criteria; keep the strongest. For open-ended tasks with objective evaluation."

[[patterns]]
name = "tournament"
description = "Candidates compete in a pairwise elimination bracket judged by a subagent. For subjective quality where 'good' is hard to quantify."

[[patterns]]
name = "loop_until_done"
description = "Iterate a refine worker, excluding prior findings each round; stop when a round yields no new findings or a hard iteration cap is hit. For exhaustive scans."

[[patterns]]
name = "script"
description = "Run a workflow authored as an executable TS/JS module (write the loop, not the prompt). The script drives its own control flow (if/while/await) using injected primitives (agent, parallelAgents, pipeline, phase, log, guards); the runtime enforces the safety boundary (depth guard, tool denial, timeout, guard injection) and persists state to .magenta/tmp/<id>/. The six presets are just official scripts of this same kind, shipped in-tree. Reusable building blocks (contract negotiation, four-axis scoring) live in workflow/magenta/presets/snippets/."
