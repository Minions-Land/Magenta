kind = "policy"
name = "policy"
description = "Approval and shell policy providers migrated from Magenta1 general-harness."
source = "magenta"
origin = "magenta1-general-harness"
origin_rel = "ported/adapted"
impl = ["policy/magenta/policy.ts", "policy/magenta/approval.ts", "policy/magenta/shell-policy.ts"]
targets = ["approval://policy", "shell://policy"]

[assumption]
compensates = "Safety boundary: the model cannot be trusted to self-police dangerous or mutating actions, so approval tiers and shell-command classification are computed deterministically off the model surface (model_surface: false)."
rationale = "stated"  # approval.ts/shell-policy.ts set model_surface:false, audience:operator
calibrated_for = ["any"]
review_trigger = "never"
load_bearing = "verified"
eval_scenarios = []

[[policies]]
name = "approval"
target = "approval://policy"
operations = ["decide", "status"]

[[policies]]
name = "shell"
target = "shell://policy"
operations = ["classify", "status"]
