kind = "sandbox"
name = "sandbox"
description = "Sandbox profile catalog and selection provider migrated from Magenta1 general-harness."
source = "magenta"
bundles = ["runtime:magenta"]
origin = "magenta1-general-harness"
origin_rel = "migrated/adapted"
impl = ["sandbox/magenta/sandbox.ts"]
profiles = ["magenta/readonly-fs.toml", "magenta/restricted.toml", "magenta/workspace-write.toml", "magenta/network-read.toml", "magenta/trusted.toml"]
targets = ["sandbox://readonly-fs", "sandbox://restricted", "sandbox://workspace-write", "sandbox://network-read", "sandbox://trusted", "hook://sandbox-select"]

[runtime]
enforcement = "not-ported"
notes = "This pack provides profile management and selection. Runtime portable guards / OS sandbox enforcement remain a separate runtime provider migration."
