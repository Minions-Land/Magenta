kind = "process"
name = "Edit"
description = "Exact string replacement in a file. Supports single or all occurrences replacement."
command = "tools/edit/magenta/process-tools/target/release/magenta-process-tools"
args = ["edit"]
operation = "write"
read_only = false
destructive = false
version = "1.0.0"
tags = ["filesystem", "io", "edit", "text-processing"]
capabilities = ["exact-match", "replace-all"]
requires = []

[parameters]
type = "object"
required = ["file_path", "old_string", "new_string"]

[parameters.properties.file_path]
type = "string"
description = "Absolute path to the file"

[parameters.properties.old_string]
type = "string"
description = "String to search for (must match exactly)"

[parameters.properties.new_string]
type = "string"
description = "String to replace with"

[parameters.properties.replace_all]
type = "boolean"
description = "Replace all occurrences (default: false, replaces first only)"
