kind = "policy"
name = "policy"
description = "Approval and shell policy providers migrated from Magenta1 general-harness."
source = "magenta"
origin = "magenta1-general-harness"
origin_rel = "ported/adapted"
impl = ["policy/magenta/approval.ts", "policy/magenta/shell-policy.ts"]
targets = ["approval://policy", "shell://policy"]

[[policies]]
name = "approval"
target = "approval://policy"
operations = ["decide", "status"]

[[policies]]
name = "shell"
target = "shell://policy"
operations = ["classify", "status"]
