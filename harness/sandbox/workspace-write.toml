# Migrated from Magenta1:
# general-harness/components/providers/sandbox/workspace-write.toml

kind = "sandbox"
name = "workspace-write"
description = "Workspace read/write access, no network. For explicit editing tools."
source = "magenta-native"
origin = "magenta1-general-harness"
origin_rel = "migrated/adapted"

fs_read = ["."]
fs_write = ["."]

network = "deny"

max_memory_mb = 2048
max_wall_seconds = 300

env_allowlist = ["PATH", "HOME", "LANG", "LC_ALL", "TMPDIR"]

backend = "auto"
