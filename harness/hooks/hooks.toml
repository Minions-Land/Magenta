kind = "hook-pack"
name = "hooks"
description = "Lifecycle hook provider migrated from Magenta1 general-harness."
source = "magenta-native"
origin = "magenta1-general-harness"
origin_rel = "ported/adapted"
impl = ["hooks/pi/hooks.ts", "sandbox/pi/sandbox.ts"]
targets = ["hook://init", "hook://pre-turn", "hook://pre-llm", "hook://post-llm", "hook://pre-tool", "hook://post-tool", "hook://compact", "hook://workflow", "hook://sandbox-select"]

[[hooks]]
name = "init"
target = "hook://init"
description = "Session/harness initialization hook."

[[hooks]]
name = "pre-turn"
target = "hook://pre-turn"
description = "Before-turn context injection hook."

[[hooks]]
name = "pre-llm"
target = "hook://pre-llm"
description = "Before-LLM lifecycle hook."

[[hooks]]
name = "post-llm"
target = "hook://post-llm"
description = "After-LLM lifecycle hook."

[[hooks]]
name = "pre-tool"
target = "hook://pre-tool"
description = "Before-tool lifecycle hook with sandbox, approval, and shell policy actions."

[[hooks]]
name = "post-tool"
target = "hook://post-tool"
description = "After-tool lifecycle hook."

[[hooks]]
name = "compact"
target = "hook://compact"
description = "Compaction lifecycle hook."

[[hooks]]
name = "workflow"
target = "hook://workflow"
description = "Workflow dispatch hook."

[[hooks]]
name = "sandbox-select"
target = "hook://sandbox-select"
description = "Sandbox profile selection hook."
