kind = "extension"
name = "extensions"
description = "Bundled pi agent extensions and extension asset discovery."
source = "pi"

[exports]
module = "extensions/pi/extensions.ts"

[[bundled_extensions]]
name = "local-credential-bridge"
path = "pi/bundled/local-credential-bridge.ts"

[[bundled_extensions]]
name = "background-events"
path = "pi/bundled/background-events/index.ts"
tools = ["bg_shell", "sub_agent"]
commands = ["events"]

[[bundled_extensions]]
name = "ssh"
path = "pi/bundled/ssh.ts"

[[bundled_extensions]]
name = "ui-optimize"
path = "pi/bundled/ui-optimize/index.ts"

[[bundled_extensions]]
name = "side-chat"
path = "pi/bundled/side-chat.ts"
commands = ["side", "btw", "s"]

[[bundled_extensions]]
name = "command-aliases"
path = "pi/bundled/command-aliases.ts"
